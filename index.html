<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2B0MScpnQwbCv-EmfgN8QCMradpW2Z02eerImu_KIzE" />
    <title>Онлайн Калькулятор ROI — Рассчитать окупаемость инвестиций в рекламу</title>
    <meta name="description" content="Бесплатный удобный калькулятор ROI. Узнайте рентабельность и окупаемость ваших инвестиций в маркетинг и рекламу за 1 секунду.">
    
    <!-- РЕКЛАМНЫЙ БЛОК ADSTERRA POPUNDER -->
    <script type='text/javascript' src='//://highrategate.com'></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); max-width: 450px; width: 100%; }
        h1 { font-size: 24px; text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #2ecc71; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #27ae60; }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; font-size: 18px; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; }
        .danger { background-color: #f8d7da; color: #721c24; }
        .faq { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; font-size: 14px; color: #666; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>Калькулятор ROI</h1>
    
    <div class="form-group">
        <label for="cost">Затраты на рекламу ($):</label>
        <input type="number" id="cost" placeholder="Например: 500" required>
    </div>
    
    <div class="form-group">
        <label for="revenue">Доход с рекламы ($):</label>
        <input type="number" id="revenue" placeholder="Например: 1200" required>
    </div>
    
    <button onclick="calculateROI()">Рассчитать окупаемость</button>
    
    <div id="resultBox" class="result"></div>

    <div class="faq">
        <h3>Что такое ROI?</h3>
        <p>ROI (Return on Investment) — это коэффициент окупаемости инвестиций. Он показывает, насколько прибыльным или убыточным является ваш проект или рекламная кампания.</p>
    </div>
</div>

<script>
function calculateROI() {
    const cost = parseFloat(document.getElementById('cost').value);
    const revenue = parseFloat(document.getElementById('revenue').value);
    const resultBox = document.getElementById('resultBox');

    if (isNaN(cost) || isNaN(revenue) || cost <= 0) {
        resultBox.style.display = 'block';
        resultBox.className = 'result danger';
        resultBox.innerHTML = 'Пожалуйста, введите корректные данные. Затраты должны быть больше 0.';
        return;
    }

    const roi = ((revenue - cost) / cost) * 100;
    resultBox.style.display = 'block';

    if (roi >= 0) {
        resultBox.className = 'result success';
        resultBox.innerHTML = `Ваш ROI: ${roi.toFixed(2)}%<br>Проект прибыльный!`;
    } else {
        resultBox.className = 'result danger';
        resultBox.innerHTML = `Ваш ROI: ${roi.toFixed(2)}%<br>Проект работает в убыток.`;
    }
}
</script>

</body>
</html>
